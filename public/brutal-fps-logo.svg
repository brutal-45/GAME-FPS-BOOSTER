<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#990000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#00d4ff" flood-opacity="0.8"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#0a0a0a"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ff0000" stroke-width="8" opacity="0.3"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#ff0000" stroke-width="4" opacity="0.5"/>
  
  <!-- Skull base -->
  <ellipse cx="256" cy="230" rx="100" ry="90" fill="url(#bgGrad)" filter="url(#glow)"/>
  
  <!-- Skull details -->
  <ellipse cx="220" cy="210" rx="30" ry="35" fill="#0a0a0a"/>
  <ellipse cx="292" cy="210" rx="30" ry="35" fill="#0a0a0a"/>
  
  <!-- Eye glow -->
  <ellipse cx="220" cy="210" rx="15" ry="20" fill="#00d4ff" filter="url(#neonGlow)">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="292" cy="210" rx="15" ry="20" fill="#00d4ff" filter="url(#neonGlow)">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Nose -->
  <path d="M256 250 L246 280 L266 280 Z" fill="#0a0a0a"/>
  
  <!-- Teeth -->
  <rect x="216" y="295" width="80" height="35" rx="5" fill="#ffffff" opacity="0.9"/>
  <line x1="236" y1="295" x2="236" y2="330" stroke="#0a0a0a" stroke-width="3"/>
  <line x1="256" y1="295" x2="256" y2="330" stroke="#0a0a0a" stroke-width="3"/>
  <line x1="276" y1="295" x2="276" y2="330" stroke="#0a0a0a" stroke-width="3"/>
  
  <!-- Lightning bolt left -->
  <path d="M130 140 L170 140 L155 200 L190 200 L140 280 L160 220 L125 220 Z" 
        fill="url(#lightningGrad)" filter="url(#neonGlow)">
    <animate attributeName="opacity" values="1;0.7;1" dur="0.5s" repeatCount="indefinite"/>
  </path>
  
  <!-- Lightning bolt right -->
  <path d="M382 140 L342 140 L357 200 L322 200 L372 280 L352 220 L387 220 Z" 
        fill="url(#lightningGrad)" filter="url(#neonGlow)">
    <animate attributeName="opacity" values="1;0.7;1" dur="0.5s" repeatCount="indefinite"/>
  </path>
  
  <!-- FPS text -->
  <text x="256" y="400" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" filter="url(#glow)">FPS</text>
  
  <!-- BRUTAL text arc (approximated) -->
  <text x="256" y="460" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="36" font-weight="bold" fill="url(#bgGrad)" filter="url(#glow)">BRUTAL</text>
  
  <!-- Corner accents -->
  <path d="M20 60 L20 20 L60 20" fill="none" stroke="#ff0000" stroke-width="4"/>
  <path d="M492 60 L492 20 L452 20" fill="none" stroke="#ff0000" stroke-width="4"/>
  <path d="M20 452 L20 492 L60 492" fill="none" stroke="#ff0000" stroke-width="4"/>
  <path d="M492 452 L492 492 L452 492" fill="none" stroke="#ff0000" stroke-width="4"/>
  
  <!-- Performance lines -->
  <line x1="40" y1="380" x2="40" y2="340" stroke="#00d4ff" stroke-width="3" opacity="0.7"/>
  <line x1="55" y1="380" x2="55" y2="320" stroke="#00d4ff" stroke-width="3" opacity="0.7"/>
  <line x1="70" y1="380" x2="70" y2="350" stroke="#00d4ff" stroke-width="3" opacity="0.7"/>
  
  <line x1="472" y1="380" x2="472" y2="340" stroke="#00d4ff" stroke-width="3" opacity="0.7"/>
  <line x1="457" y1="380" x2="457" y2="320" stroke="#00d4ff" stroke-width="3" opacity="0.7"/>
  <line x1="442" y1="380" x2="442" y2="350" stroke="#00d4ff" stroke-width="3" opacity="0.7"/>
</svg>
